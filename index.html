<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Entity</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
     body, html { 
         margin: 0; 
         padding: 0; 
         width: 100vw; 
         height: 100vh; 
         background-color: #030305; 
         overflow: hidden; 
         touch-action: none; 
         user-select: none; 
         -webkit-user-select: none;
     }
     #glcanvas { 
         display: block; 
         width: 100%; 
         height: 100%; 
         outline: none;
         cursor: grab;
     }
     #glcanvas:active {
         cursor: grabbing;
     }
     .glass-panel {
         background: rgba(10, 10, 12, 0.6);
         backdrop-filter: blur(16px);
         -webkit-backdrop-filter: blur(16px);
         border: 1px solid rgba(255, 255, 255, 0.08);
     }
     .fade-out { 
         opacity: 0; 
         pointer-events: none; 
     }
  </style>
</head>
<body class="text-zinc-300">

  <!-- HUD -->
  <div class="absolute inset-0 z-10 pointer-events-none flex flex-col justify-between p-6 md:p-8 transition-opacity duration-1000 opacity-0" id="hud">
     <div class="flex justify-between items-start">
        <div class="font-mono text-[10px] tracking-[0.2em] uppercase text-zinc-500 flex flex-col gap-1">
           <span class="text-zinc-100">Phase_02</span>
           <span>Volumetric Refraction</span>
        </div>
        
        <!-- Audio Control -->
        <button id="audio-toggle" class="pointer-events-auto flex items-center gap-3 cursor-pointer outline-none group active:scale-95 transition-transform" aria-label="Toggle Audio">
           <span id="audio-label" class="font-mono text-[10px] tracking-[0.2em] uppercase text-zinc-500 group-hover:text-zinc-300 transition-colors duration-300">Audio_On</span>
           <div id="audio-indicator" class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_10px_rgba(16,185,129,0.5)] transition-all duration-500"></div>
        </button>
     </div>
     <div class="flex justify-between items-end">
        <div id="coord-display" class="font-mono text-[10px] tracking-[0.2em] text-zinc-500">X: 0.000 <br> Y: 0.000</div>
        <div id="freq-display" class="font-mono text-[10px] tracking-[0.2em] text-zinc-500 text-right">55.00 HZ <br> ROOT</div>
     </div>
  </div>

  <!-- Entry Overlay -->
  <div id="overlay" class="absolute inset-0 z-50 flex items-center justify-center bg-[#030305] transition-opacity duration-[1500ms]">
     <button id="entry-btn" class="glass-panel px-10 py-5 rounded-full font-mono text-xs tracking-[0.4em] uppercase text-zinc-300 hover:text-white hover:bg-white/10 transition-all duration-500 outline-none cursor-pointer scale-100 active:scale-95" aria-label="Enter Experience">
       Enter
     </button>
  </div>
  
  <canvas id="glcanvas"></canvas>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
     import * as THREE from 'three';

     // ASSUMPTION: Device memory is sufficient to handle WebGL instancing and convolution buffers without explicit cleanup routines for a single-page session.
     let audioCtx = null;
     let masterGain = null;
     let convolver = null;
     let filter = null;
     let isAudioActive = true;
     
     const pentatonic = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33];
     let lastChimeTime = 0;

     function createReverb() {
         const length = audioCtx.sampleRate * 3.0; 
         const buffer = audioCtx.createBuffer(2, length, audioCtx.sampleRate);
         for (let c = 0; c < 2; c++) {
             const channel = buffer.getChannelData(c);
             for (let i = 0; i < length; i++) {
                 channel[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 3);
             }
         }
         const conv = audioCtx.createConvolver();
         conv.buffer = buffer;
         return conv;
     }

     function bootAudio() {
         audioCtx = new (window.AudioContext || window.webkitAudioContext)();
         masterGain = audioCtx.createGain();
         masterGain.gain.value = 0.8;
         
         convolver = createReverb();
         
         const drone = audioCtx.createOscillator();
         drone.type = 'sine';
         drone.frequency.value = 55;

         filter = audioCtx.createBiquadFilter();
         filter.type = 'lowpass';
         filter.frequency.value = 120;
         filter.Q.value = 4;

         const droneGain = audioCtx.createGain();
         droneGain.gain.value = 0.3;

         drone.connect(filter);
         filter.connect(droneGain);
         droneGain.connect(convolver);
         convolver.connect(masterGain);
         masterGain.connect(audioCtx.destination);
         
         drone.start();
     }

     function playChime(vel) {
         if (!audioCtx || audioCtx.state !== 'running' || !isAudioActive) return;
         const now = audioCtx.currentTime;
         if (now - lastChimeTime < 0.08) return;
         lastChimeTime = now;

         const freq = pentatonic[Math.floor(Math.random() * pentatonic.length)];
         const osc = audioCtx.createOscillator();
         osc.type = 'sine';
         osc.frequency.value = freq;

         const gain = audioCtx.createGain();
         const vol = Math.min(vel * 0.05, 0.4);
         
         gain.gain.setValueAtTime(0, now);
         gain.gain.linearRampToValueAtTime(vol, now + 0.02);
         gain.gain.exponentialRampToValueAtTime(0.001, now + 4.0);

         const chimeFilter = audioCtx.createBiquadFilter();
         chimeFilter.type = 'bandpass';
         chimeFilter.frequency.value = freq;
         chimeFilter.Q.value = 2;

         osc.connect(chimeFilter);
         chimeFilter.connect(gain);
         gain.connect(convolver); 
         
         osc.start(now);
         osc.stop(now + 4.0);

         document.getElementById('freq-display').innerHTML = `${freq.toFixed(2)} HZ <br> PEAK`;
         setTimeout(() => {
             document.getElementById('freq-display').innerHTML = `55.00 HZ <br> ROOT`;
         }, 500);
     }

     const canvas = document.getElementById('glcanvas');
     const scene = new THREE.Scene();
     scene.fog = new THREE.FogExp2(0x030305, 0.03);

     const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
     camera.position.z = 16;

     const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false, powerPreference: "high-performance" });
     // ASSUMPTION: Enforcing pixel ratio caps universally prevents thermal degradation on mobile.
     renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
     renderer.setSize(window.innerWidth, window.innerHeight);
     renderer.toneMapping = THREE.ACESFilmicToneMapping;
     renderer.toneMappingExposure = 1.2;

     const lightIndigo = new THREE.PointLight(0x4f46e5, 20, 30);
     const lightRose = new THREE.PointLight(0xe11d48, 20, 30);
     const lightCyan = new THREE.PointLight(0x06b6d4, 20, 30);
     scene.add(lightIndigo, lightRose, lightCyan);
     
     const ambient = new THREE.AmbientLight(0x0a0a0c, 2.0);
     scene.add(ambient);

     const bodyGeo = new THREE.IcosahedronGeometry(2.8, 64);
     const bodyBasePos = bodyGeo.attributes.position.clone();
     const bodyMat = new THREE.MeshPhysicalMaterial({
         color: 0xffffff,
         metalness: 0.1,
         roughness: 0.05,
         transmission: 1.0,
         ior: 1.52,
         thickness: 3.0,
         dispersion: 2.0,
         clearcoat: 1.0,
         clearcoatRoughness: 0.1
     });
     const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
     scene.add(bodyMesh);

     // ASSUMPTION: 1200 instanced meshes is the optimal balance between swarm density and mobile rendering limits.
     const shardCount = 1200;
     const shardGeo = new THREE.OctahedronGeometry(0.04, 0);
     const shardMat = new THREE.MeshStandardMaterial({
         color: 0xffffff,
         emissive: 0xffffff,
         emissiveIntensity: 0.5,
         roughness: 0.2,
         metalness: 0.8
     });
     const shards = new THREE.InstancedMesh(shardGeo, shardMat, shardCount);
     scene.add(shards);

     const dummy = new THREE.Object3D();
     const shardData = [];
     for(let i=0; i<shardCount; i++) {
         const radius = 6 + Math.random() * 12;
         const theta = Math.random() * Math.PI * 2;
         const phi = Math.acos((Math.random() * 2) - 1);
         
         const x = radius * Math.sin(phi) * Math.cos(theta);
         const y = radius * Math.sin(phi) * Math.sin(theta);
         const z = radius * Math.cos(phi);
         
         shardData.push({
             x, y, z, 
             ox: x, oy: y, oz: z, 
             vx: 0, vy: 0, vz: 0,
             phase: Math.random() * Math.PI * 2,
             speed: 0.5 + Math.random() * 1.5
         });
     }

     const pointer = new THREE.Vector2(0, 0);
     const pointer3D = new THREE.Vector3(999, 999, 0);
     const raycaster = new THREE.Raycaster();
     const planeZ0 = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
     const coordDisplay = document.getElementById('coord-display');

     let isDragging = false;
     let lastPointer = new THREE.Vector2(0, 0);
     const rotVelocity = new THREE.Vector2(0, 0);
     const posVelocity = new THREE.Vector3(0, 0, 0);
     const targetPos = new THREE.Vector3(0, 0, 0);

     function handlePointerDown(e) {
         // Touch interactions on mobile fire both touchstart and mousedown in succession.
         // If e is undefined (called from touch handler), proceed.
         // If e is defined, only reject if it explicitly hit the audio toggle.
         if (e && e.target && (e.target.id === 'audio-toggle' || e.target.closest('#audio-toggle'))) return;
         isDragging = true;
         lastPointer.copy(pointer); 
     }

     function handlePointerUp() {
         isDragging = false;
     }

     function updateCoords(clientX, clientY) {
         const nx = (clientX / window.innerWidth) * 2 - 1;
         const ny = -(clientY / window.innerHeight) * 2 + 1;
         
         const dx = nx - pointer.x;
         const dy = ny - pointer.y;
         const pointerVel = Math.sqrt(dx*dx + dy*dy);
         
         pointer.set(nx, ny);
         coordDisplay.innerHTML = `X: ${nx.toFixed(3)} <br> Y: ${ny.toFixed(3)}`;

         raycaster.setFromCamera(pointer, camera);
         raycaster.ray.intersectPlane(planeZ0, pointer3D);

         if (isDragging) {
             rotVelocity.x = (ny - lastPointer.y) * 1.5;
             rotVelocity.y = (nx - lastPointer.x) * 1.5;
         }

         lastPointer.set(nx, ny);

         if (pointerVel > 0.002 && !isDragging) {
             playChime(pointerVel * 200);
         }
     }

     window.addEventListener('mousedown', handlePointerDown);
     window.addEventListener('mouseup', handlePointerUp);
     window.addEventListener('mousemove', (e) => updateCoords(e.clientX, e.clientY));
     
     window.addEventListener('touchstart', (e) => {
         if(e.touches.length > 0) {
             handlePointerDown(e); // Pass event object to assess target.
             updateCoords(e.touches[0].clientX, e.touches[0].clientY);
         }
     }, { passive: false });
     window.addEventListener('touchend', handlePointerUp);
     window.addEventListener('touchmove', (e) => {
         e.preventDefault();
         if(e.touches.length > 0) {
             updateCoords(e.touches[0].clientX, e.touches[0].clientY);
         }
     }, { passive: false });

     let resizeTimeout;
     window.addEventListener('resize', () => {
         clearTimeout(resizeTimeout);
         resizeTimeout = setTimeout(() => {
             camera.aspect = window.innerWidth / window.innerHeight;
             camera.updateProjectionMatrix();
             renderer.setSize(window.innerWidth, window.innerHeight);
         }, 100);
     });

     const overlay = document.getElementById('overlay');
     const hud = document.getElementById('hud');
     const audioToggleBtn = document.getElementById('audio-toggle');
     const audioLabel = document.getElementById('audio-label');
     const audioIndicator = document.getElementById('audio-indicator');
     
     document.getElementById('entry-btn').addEventListener('click', () => {
         bootAudio();
         if (audioCtx.state === 'suspended') audioCtx.resume();
         overlay.classList.add('fade-out');
         hud.classList.remove('opacity-0');
     });

     audioToggleBtn.addEventListener('click', (e) => {
         e.stopPropagation();
         if (!audioCtx) return;

         isAudioActive = !isAudioActive;
         if (isAudioActive) {
             audioCtx.resume();
             audioLabel.innerText = "Audio_On";
             audioIndicator.classList.replace('bg-zinc-700', 'bg-emerald-500');
             audioIndicator.classList.add('animate-pulse', 'shadow-[0_0_10px_rgba(16,185,129,0.5)]');
         } else {
             audioCtx.suspend();
             audioLabel.innerText = "Audio_Off";
             audioIndicator.classList.replace('bg-emerald-500', 'bg-zinc-700');
             audioIndicator.classList.remove('animate-pulse', 'shadow-[0_0_10px_rgba(16,185,129,0.5)]');
         }
     });

     const clock = new THREE.Clock();
     
     function loop() {
         requestAnimationFrame(loop);
         const time = clock.getElapsedTime();

         lightIndigo.position.set(Math.cos(time * 0.5) * 6, Math.sin(time * 0.3) * 6, Math.sin(time * 0.5) * 4);
         lightRose.position.set(Math.cos(time * 0.7 + 2) * 6, Math.sin(time * 0.6 + 2) * 6, Math.cos(time * 0.4) * 4);
         lightCyan.position.set(Math.sin(time * 0.4 + 4) * 6, Math.cos(time * 0.8 + 4) * 6, Math.sin(time * 0.6) * 4);

         const pos = bodyGeo.attributes.position;
         const v = new THREE.Vector3();
         for(let i=0; i<pos.count; i++) {
             v.fromBufferAttribute(bodyBasePos, i);
             const wave1 = Math.sin(time * 1.5 + v.y * 1.8) * 0.12;
             const wave2 = Math.cos(time * 1.2 + v.x * 2.2) * 0.12;
             const wave3 = Math.sin(time * 0.9 + v.z * 1.5) * 0.08;
             v.addScaledVector(v.clone().normalize(), wave1 + wave2 + wave3);
             pos.setXYZ(i, v.x, v.y, v.z);
         }
         pos.needsUpdate = true;
         bodyGeo.computeVertexNormals();

         if (isDragging) {
             targetPos.x = pointer.x * 3.0;
             targetPos.y = pointer.y * 3.0;
             
             bodyMesh.rotation.x += rotVelocity.x;
             bodyMesh.rotation.y += rotVelocity.y;
             
             rotVelocity.multiplyScalar(0.9);
         } else {
             targetPos.set(0, 0, 0);

             rotVelocity.multiplyScalar(0.96);
             bodyMesh.rotation.x += rotVelocity.x;
             bodyMesh.rotation.y += rotVelocity.y;

             const trackWeight = Math.max(0, 1.0 - rotVelocity.length() * 15);
             if (trackWeight > 0) {
                 bodyMesh.rotation.y += (pointer.x * 0.2 - bodyMesh.rotation.y) * 0.05 * trackWeight;
                 bodyMesh.rotation.x += (-pointer.y * 0.2 - bodyMesh.rotation.x) * 0.05 * trackWeight;
             }
         }

         posVelocity.x += (targetPos.x - bodyMesh.position.x) * 0.1;
         posVelocity.y += (targetPos.y - bodyMesh.position.y) * 0.1;
         posVelocity.multiplyScalar(0.82); 
         bodyMesh.position.add(posVelocity);

         if (filter && audioCtx && isAudioActive) {
             filter.frequency.setTargetAtTime(120 + ((pointer.y + 1) / 2) * 1200, audioCtx.currentTime, 0.1);
         }

         for(let i=0; i<shardCount; i++) {
             const d = shardData[i];
             
             d.ox = d.ox * Math.cos(0.001 * d.speed) - d.oz * Math.sin(0.001 * d.speed);
             d.oz = d.ox * Math.sin(0.001 * d.speed) + d.oz * Math.cos(0.001 * d.speed);
             
             const dx = d.x - pointer3D.x;
             const dy = d.y - pointer3D.y;
             const distSq = dx*dx + dy*dy;
             
             if (distSq < 15.0 && pointer3D.x !== 999) {
                 const force = (15.0 - distSq) * (isDragging ? 0.06 : 0.02);
                 d.vx += (dx / Math.sqrt(distSq)) * force;
                 d.vy += (dy / Math.sqrt(distSq)) * force;
             }

             d.vx += (d.ox - d.x) * 0.02;
             d.vy += (d.oy - d.y) * 0.02;
             d.vz += (d.oz - d.z) * 0.02;

             d.vx *= 0.90;
             d.vy *= 0.90;
             d.vz *= 0.90;

             d.x += d.vx;
             d.y += d.vy;
             d.z += d.vz;

             dummy.position.set(d.x, d.y, d.z);
             dummy.rotation.set(time * d.speed, time * d.speed * 0.5, 0);
             
             const velMag = Math.sqrt(d.vx*d.vx + d.vy*d.vy + d.vz*d.vz);
             dummy.scale.setScalar(1 + velMag * 2);
             
             dummy.updateMatrix();
             shards.setMatrixAt(i, dummy.matrix);
         }
         shards.instanceMatrix.needsUpdate = true;

         renderer.render(scene, camera);
     }
     loop();
  </script>
</body>
</html>
